# =============================================================================
# Tmux Configuration
# =============================================================================

# --- Prefix Key ---
# Change prefix from Ctrl+b to Ctrl+a (easier to reach)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- General Settings ---
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g history-limit 10000
set -g base-index 1           # Start window numbering at 1
setw -g pane-base-index 1     # Start pane numbering at 1
set -g renumber-windows on    # Renumber windows when one is closed
set -sg escape-time 0         # No delay for escape key
set -g display-time 2000      # Status messages shown for 2 seconds
set -g focus-events on
set -g mouse on               # Enable mouse support

# --- Key Bindings ---

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Split panes using | and - (intuitive)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Navigate panes with Ctrl+hjkl (no prefix needed)
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# Resize panes with prefix + HJKL
bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5

# Switch windows with Alt+number (no prefix)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5

# Switch windows with Alt+Left/Right
bind -n M-Left  previous-window
bind -n M-Right next-window

# Move windows left/right
bind-key S-Left  swap-window -t -1 \; select-window -t -1
bind-key S-Right swap-window -t +1 \; select-window -t +1

# Session management
bind s choose-session          # Interactive session picker
bind S new-session             # New session
bind X confirm-before -p "Kill session #S? (y/n)" kill-session

# Quick layouts
bind M-1 select-layout even-horizontal
bind M-2 select-layout even-vertical
bind M-3 select-layout main-horizontal
bind M-4 select-layout main-vertical
bind M-5 select-layout tiled

# Zoom pane toggle (make pane fullscreen)
bind z resize-pane -Z

# Copy mode with vi keys
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

# --- Status Bar ---
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left

# Colors
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g window-status-current-style "bg=#89b4fa,fg=#1e1e2e,bold"
set -g window-status-style "bg=#313244,fg=#cdd6f4"
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"
set -g message-style "bg=#f38ba8,fg=#1e1e2e,bold"

# Status left: session name
set -g status-left-length 40
set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold] #S #[default] "

# Status right: date/time
set -g status-right-length 60
set -g status-right "#[fg=#a6e3a1] %Y-%m-%d #[fg=#cdd6f4] %H:%M "

# Window status format
setw -g window-status-format " #I:#W "
setw -g window-status-current-format " #I:#W "
